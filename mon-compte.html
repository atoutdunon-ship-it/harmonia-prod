<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Compte — HARMONIA</title>
<link rel="stylesheet" href="harmonia-shared.css?v=89">
<style>
.account-page { max-width: 720px; margin: 0 auto; padding: 120px 32px 80px; }
.account-section {
  background: var(--navy2);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 32px;
  margin-bottom: 24px;
}
.account-section-title {
  font-family: Arial, sans-serif;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent2); margin-bottom: 24px;
}
.account-field { margin-bottom: 16px; }
.account-field label {
  display: block; font-family: Arial, sans-serif;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gray); margin-bottom: 6px;
}
.account-field input {
  width: 100%; background: var(--navy3);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--white); font-family: Arial, sans-serif; font-size: 13px;
  padding: 10px 14px; outline: none; box-sizing: border-box;
}
.account-field input:focus { border-color: rgba(31,158,92,0.4); }
.account-btn {
  background: var(--accent2); color: var(--dark);
  font-family: Arial, sans-serif; font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  border: none; padding: 12px 28px; cursor: pointer;
  transition: opacity 0.2s; margin-top: 8px;
}
.account-btn:hover { opacity: 0.85; }
.account-btn-ghost {
  background: none; color: var(--gray);
  border: 1px solid rgba(255,255,255,0.15);
  font-family: Arial, sans-serif; font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  padding: 12px 28px; cursor: pointer; transition: all 0.2s;
}
.account-btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.4); }
.account-msg { font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 1px; padding: 10px 0; }
.account-msg.ok  { color: var(--accent2); }
.account-msg.err { color: #e07070; }
/* Historique commandes */
.order-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  gap: 16px; flex-wrap: wrap;
}
.order-row:last-child { border-bottom: none; }
.order-id { font-family: Georgia, serif; font-size: 13px; color: var(--white); }
.order-date { font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 1px; color: var(--gray); }
.order-total { font-family: Georgia, serif; font-size: 16px; color: var(--accent2); }
.order-status {
  font-family: Arial, sans-serif; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; padding: 3px 10px;
  background: rgba(31,158,92,0.1); color: var(--accent2);
  border: 1px solid rgba(31,158,92,0.2);
}
.order-empty { font-family: Arial, sans-serif; font-size: 12px; color: var(--gray); text-align: center; padding: 32px 0; }
#account-not-logged { display: none; text-align: center; padding: 120px 32px; }
#account-not-logged p { font-family: Arial, sans-serif; font-size: 13px; color: var(--gray); margin-bottom: 24px; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" style="display:flex;align-items:center;position:relative;" data-editable-img="logo_nav">
    <img src="images/logo-base.png" alt="HARMONIA" style="height:36px;">
  </a>
  <button class="hamburger" id="hamburger-btn" aria-label="Menu" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li data-module-nav="about"><a href="qui-sommes-nous.html" data-i18n="nav_about">QUI SOMMES-NOUS</a></li>
    <li data-module-nav="artists"><a href="artistes.html" data-i18n="nav_artists">Artistes</a></li>
    <li data-module-nav="cesaria"><a href="cesaria.html" data-i18n="nav_cesaria">Cesária Évora</a></li>
    <li data-module-nav="news"><a href="actualites.html" data-i18n="nav_news">Actualités</a></li>
    <li data-module-nav="shop"><a href="boutique.html" data-i18n="nav_boutique">Boutique</a></li>
    <li data-module-nav="contact"><a href="contact.html" data-i18n="nav_contact">Contact</a></li>
    <li id="mobile-connect-li" style="width:100%;"><button onclick="openAdmin(event)" style="display:block;width:100%;background:none;border:none;border-bottom:1px solid rgba(31,158,92,0.08);color:var(--white);font-family:Arial,sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:14px 32px;text-align:left;cursor:pointer;" data-i18n="nav_login">Se connecter</button></li>
  </ul>
  <div class="lang-dropdown" id="lang-dropdown">
    <button class="lang-current" id="lang-current-btn">
      <span id="lang-current-label">Português</span>
      <span class="lang-arrow"></span>
    </button>
    <div class="lang-menu">
      <button class="lang-option" data-lang="pt">Português</button>
      <button class="lang-option" data-lang="fr">Français</button>
      <button class="lang-option" data-lang="en">English</button>
      <button class="lang-option" data-lang="es">Español</button>
    </div>
  </div>
  <button class="nav-search-btn" onclick="openSearch()" title="Rechercher" aria-label="Rechercher">Rechercher</button>
  <button class="nav-cart-btn" id="nav-cart-btn" onclick="openMiniCart()" title="Panier" aria-label="Panier">PANIER<span id="cart-badge" class="cart-badge" style="display:none;"></span></button>
  <button class="nav-connect-btn" id="nav-connect-btn" onclick="openAdmin(event)" data-i18n="nav_login">Se connecter</button>
</nav>

<div id="account-not-logged">
  <p>Vous devez être connecté pour accéder à votre compte.</p>
  <a href="#" onclick="openAdmin(event)" style="font-family:Arial;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);text-decoration:none;">Se connecter →</a>
</div>

<div class="account-page" id="account-page" style="display:none;">

  <!-- Profil -->
  <div class="account-section">
    <div class="account-section-title">Mon Profil</div>
    <div class="account-field">
      <label>Nom complet</label>
      <input type="text" id="ac-name" autocomplete="name">
    </div>
    <div class="account-field">
      <label>Adresse email</label>
      <input type="email" id="ac-email" autocomplete="email">
    </div>
    <div class="account-section-title" style="margin-top:28px;">Changer le mot de passe</div>
    <div class="account-field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="ac-pass" placeholder="Laisser vide pour ne pas changer" autocomplete="new-password">
    </div>
    <div class="account-field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="ac-pass2" autocomplete="new-password">
    </div>
    <div class="account-msg" id="ac-msg"></div>
    <button class="account-btn" onclick="saveProfile()">Enregistrer</button>
  </div>

  <!-- Historique commandes -->
  <div class="account-section">
    <div class="account-section-title">Historique des commandes</div>
    <div id="ac-orders-list"></div>
  </div>

  <!-- Déconnexion -->
  <div style="text-align:right;">
    <button class="account-btn-ghost" onclick="doLogout();window.location.href='artistes.html'">Se déconnecter</button>
  </div>

</div>

<script src="harmonia-shared.js?v=89"></script>
<script>
(function initAccountPage() {
  function render() {
    if (!currentUser) {
      document.getElementById('account-not-logged').style.display = 'block';
      document.getElementById('account-page').style.display = 'none';
      return;
    }
    document.getElementById('account-not-logged').style.display = 'none';
    document.getElementById('account-page').style.display = 'block';
    // Pré-remplir profil
    document.getElementById('ac-name').value  = currentUser.name  || '';
    document.getElementById('ac-email').value = currentUser.email || '';
    // Charger commandes
    renderOrders();
  }

  function renderOrders() {
    var list = document.getElementById('ac-orders-list');
    var allOrders = [];
    try { allOrders = JSON.parse(localStorage.getItem('harmonia_orders')) || []; } catch(e) {}
    var myOrders = allOrders.filter(function(o) {
      return o.email && currentUser.email && o.email.toLowerCase() === currentUser.email.toLowerCase();
    });
    if (!myOrders.length) {
      list.innerHTML = '<div class="order-empty">Aucune commande pour le moment.</div>';
      return;
    }
    list.innerHTML = myOrders.map(function(o) {
      var d = new Date(o.date);
      var dateStr = d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
      var items = (o.items || []).map(function(i){ return i.name + (i.qty > 1 ? ' ×' + i.qty : ''); }).join(', ');
      return '<div class="order-row">' +
        '<div><div class="order-id">' + o.id + '</div><div class="order-date">' + dateStr + (items ? ' · ' + items : '') + '</div></div>' +
        '<div style="display:flex;align-items:center;gap:16px;">' +
          '<span class="order-total">' + (o.total || 0).toFixed(2).replace('.',',') + ' €</span>' +
          '<span class="order-status">' + (o.status || 'en cours') + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  window.saveProfile = function() {
    var msg = document.getElementById('ac-msg');
    var name  = document.getElementById('ac-name').value.trim();
    var email = document.getElementById('ac-email').value.trim().toLowerCase();
    var pass  = document.getElementById('ac-pass').value;
    var pass2 = document.getElementById('ac-pass2').value;
    if (!name || !email) { msg.className='account-msg err'; msg.textContent='Nom et email requis.'; return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { msg.className='account-msg err'; msg.textContent='Email invalide.'; return; }
    if (pass && pass !== pass2) { msg.className='account-msg err'; msg.textContent='Les mots de passe ne correspondent pas.'; return; }
    if (pass && pass.length < 6) { msg.className='account-msg err'; msg.textContent='Mot de passe trop court (6 caractères minimum).'; return; }
    // Mettre à jour en DB
    var idx = DB.users.findIndex(function(u){ return u.id === currentUser.id; });
    if (idx === -1) { msg.className='account-msg err'; msg.textContent='Utilisateur introuvable.'; return; }
    DB.users[idx].name  = name;
    DB.users[idx].email = email;
    if (pass) DB.users[idx].pass = pass;
    saveData(DB);
    // Mettre à jour session
    currentUser = DB.users[idx];
    try {
      sessionStorage.setItem('harmonia_user', JSON.stringify({
        id:currentUser.id, login:currentUser.login, email:currentUser.email,
        name:currentUser.name, role:currentUser.role, permissions:currentUser.permissions
      }));
    } catch(e) {}
    msg.className='account-msg ok'; msg.textContent='Profil mis à jour avec succès.';
    document.getElementById('ac-pass').value='';
    document.getElementById('ac-pass2').value='';
    if (typeof updateNavConnectBtn === 'function') updateNavConnectBtn();
    setTimeout(function(){ msg.textContent=''; }, 3000);
  };

  // Render au chargement
  render();
})();
</script>
</body>
</html>
